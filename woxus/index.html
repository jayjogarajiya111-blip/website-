<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WOXUS - AI Assistant</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Space+Mono:wght@400;700&display=swap');

    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #020c1a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      font-family: 'Inter', sans-serif;
    }

    /* ── Starfield Canvas ── */
    #stars-canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    /* ── Hero Container ── */
    .hero {
      position: relative;
      width: 700px;
      height: 700px;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1;
    }

    /* ── Orbiting Rings ── */
    .ring {
      position: absolute;
      border-radius: 50%;
      border: 1px solid rgba(34, 211, 238, 0.18);
      animation: ring-spin linear infinite;
    }

    .ring-1 {
      width: 620px;
      height: 620px;
      animation-duration: 60s;
      border-color: rgba(34, 211, 238, 0.12);
    }

    .ring-2 {
      width: 500px;
      height: 500px;
      animation-duration: 45s;
      animation-direction: reverse;
      border-color: rgba(34, 211, 238, 0.16);
    }

    .ring-3 {
      width: 380px;
      height: 380px;
      animation-duration: 30s;
      border-color: rgba(34, 211, 238, 0.22);
    }

    @keyframes ring-spin {
      from {
        transform: rotate(0deg) scale(1);
      }

      50% {
        transform: rotate(180deg) scale(1.025);
      }

      to {
        transform: rotate(360deg) scale(1);
      }
    }

    /* ── Saturn Tilted Belt ── */
    .saturn-belt {
      position: absolute;
      width: 750px;
      height: 180px;
      border: 3px solid rgba(34, 211, 238, 0.20);
      border-radius: 50%;
      transform: rotate(-20deg);
      z-index: 2;
      pointer-events: none;
    }

    .saturn-belt::before {
      content: '';
      position: absolute;
      inset: 8px;
      border: 1.5px solid rgba(34, 211, 238, 0.10);
      border-radius: 50%;
    }

    /* Orbiting dots on belt */
    .belt-dot {
      position: absolute;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #22d3ee;
      box-shadow: 0 0 10px #22d3ee, 0 0 20px rgba(34, 211, 238, 0.5);
      animation: orbit-belt linear infinite;
    }

    .belt-dot:nth-child(1) {
      animation-duration: 8s;
      animation-delay: 0s;
    }

    .belt-dot:nth-child(2) {
      animation-duration: 12s;
      animation-delay: -4s;
    }

    .belt-dot:nth-child(3) {
      animation-duration: 10s;
      animation-delay: -7s;
    }

    .belt-dot:nth-child(4) {
      width: 4px;
      height: 4px;
      animation-duration: 15s;
      animation-delay: -2s;
      background: rgba(255, 255, 255, 0.9);
      box-shadow: 0 0 6px white;
    }

    @keyframes orbit-belt {
      from {
        offset-distance: 0%;
      }

      to {
        offset-distance: 100%;
      }
    }

    /* Use JS for orbiting dots position, simulated below with transform */

    /* ── Planet Body ── */
    .planet {
      position: relative;
      z-index: 5;
      width: 240px;
      height: 240px;
      border-radius: 50%;
      background: radial-gradient(circle at 40% 35%, #0d2a3a, #020c1a 70%);
      border: 1.5px solid rgba(34, 211, 238, 0.30);
      box-shadow:
        0 0 60px rgba(34, 211, 238, 0.15),
        0 0 120px rgba(34, 211, 238, 0.08),
        inset 0 0 40px rgba(34, 211, 238, 0.08);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      animation: planet-float 6s ease-in-out infinite;
      overflow: hidden;
    }

    /* Grid overlay on planet */
    .planet::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background-image:
        linear-gradient(rgba(34, 211, 238, 0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(34, 211, 238, 0.04) 1px, transparent 1px);
      background-size: 20px 20px;
      transform: rotate(45deg) scale(1.5);
    }

    /* Inner glow core */
    .planet-core {
      position: absolute;
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: rgba(34, 211, 238, 0.12);
      filter: blur(20px);
      animation: core-pulse 3s ease-in-out infinite;
    }

    @keyframes core-pulse {

      0%,
      100% {
        transform: scale(0.8);
        opacity: 0.4;
      }

      50% {
        transform: scale(1.2);
        opacity: 0.7;
      }
    }

    @keyframes planet-float {

      0%,
      100% {
        transform: translateY(0px);
      }

      50% {
        transform: translateY(-10px);
      }
    }

    /* ── WOXUS Logo Text ── */
    .logo-wrap {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    .logo-text {
      font-family: 'Inter', sans-serif;
      font-size: 52px;
      font-weight: 900;
      letter-spacing: -2px;
      color: #fff;
      text-shadow: 0 0 30px rgba(34, 211, 238, 0.4);
      line-height: 1;
      user-select: none;
    }

    .logo-text .cyan {
      color: #22d3ee;
      font-style: italic;
      animation: glitch 4s linear infinite;
      display: inline-block;
    }

    @keyframes glitch {

      0%,
      90%,
      100% {
        transform: translate(0);
      }

      92% {
        transform: translate(-2px, 1px);
      }

      94% {
        transform: translate(2px, -1px);
      }

      96% {
        transform: translate(-1px, 2px);
      }

      98% {
        transform: translate(1px, -2px);
      }
    }

    .logo-sub {
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      letter-spacing: 8px;
      color: rgba(34, 211, 238, 0.6);
      text-transform: uppercase;
    }

    /* Animated underline */
    .logo-line {
      width: 160px;
      height: 1.5px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 99px;
      overflow: hidden;
      margin-top: 2px;
    }

    .logo-line-inner {
      height: 100%;
      width: 100%;
      background: linear-gradient(90deg, transparent, #22d3ee, transparent);
      animation: line-sweep 3s linear infinite;
    }

    @keyframes line-sweep {
      from {
        transform: translateX(-100%);
      }

      to {
        transform: translateX(100%);
      }
    }

    /* ── Floating Data Nodes ── */
    .node {
      position: absolute;
      width: 5px;
      height: 5px;
      border-radius: 50%;
      pointer-events: none;
      z-index: 3;
    }

    .node.cyan {
      background: #22d3ee;
      box-shadow: 0 0 10px rgba(34, 211, 238, 0.9);
    }

    .node.white {
      background: #fff;
      box-shadow: 0 0 8px rgba(255, 255, 255, 0.7);
    }

    /* ── Small ring dots (corner accents) ── */
    .accent-dot {
      position: absolute;
      border-radius: 50%;
      background: rgba(34, 211, 238, 0.7);
      box-shadow: 0 0 8px #22d3ee;
      pointer-events: none;
    }

    /* ── Avatar chip (top-right echo from screenshot) ── */
    .avatar-chip {
      position: fixed;
      top: 20px;
      right: 20px;
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: rgba(2, 6, 23, 0.8);
      border: 2px solid rgba(34, 211, 238, 0.35);
      backdrop-filter: blur(10px);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', sans-serif;
      font-weight: 900;
      font-size: 18px;
      color: #22d3ee;
      box-shadow: 0 0 20px rgba(34, 211, 238, 0.2);
      z-index: 100;
    }

    /* ── Scroll chevron ── */
    .chevron {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255, 255, 255, 0.18);
      animation: chevron-bounce 2s ease-in-out infinite;
      z-index: 10;
    }

    @keyframes chevron-bounce {

      0%,
      100% {
        transform: translateX(-50%) translateY(0);
      }

      50% {
        transform: translateX(-50%) translateY(10px);
      }
    }

    .chevron svg {
      display: block;
    }
  </style>
</head>

<body>

  <!-- Stars Canvas -->
  <canvas id="stars-canvas"></canvas>

  <!-- Avatar chip (top right) -->
  <div class="avatar-chip">N</div>

  <!-- Hero Section -->
  <div class="hero">

    <!-- Orbiting Rings -->
    <div class="ring ring-1"></div>
    <div class="ring ring-2"></div>
    <div class="ring ring-3"></div>

    <!-- Saturn Tilted Belt -->
    <div class="saturn-belt">
      <div class="belt-dot" id="bd1"></div>
      <div class="belt-dot" id="bd2"></div>
      <div class="belt-dot" id="bd3"></div>
      <div class="belt-dot" id="bd4"></div>
    </div>

    <!-- Floating Nodes (scattered) -->
    <div class="node cyan" style="top:8%;  left:22%; animation: node-float1 7s ease-in-out infinite;"></div>
    <div class="node white" style="top:15%; right:18%; animation: node-float2 9s ease-in-out infinite;"></div>
    <div class="node cyan" style="bottom:12%; left:15%; animation: node-float1 11s ease-in-out infinite 1s;"></div>
    <div class="node white" style="bottom:18%; right:20%; animation: node-float2 8s ease-in-out infinite 3s;"></div>
    <div class="node cyan" style="top:40%; left:4%;  animation: node-float1 10s ease-in-out infinite 2s;"></div>
    <div class="node cyan" style="top:55%; right:5%; animation: node-float2 12s ease-in-out infinite;"></div>

    <!-- Planet -->
    <div class="planet">
      <div class="planet-core"></div>
      <div class="logo-wrap">
        <div class="logo-text">WOX<span class="cyan">US</span></div>
        <div class="logo-sub">Woxus V.01</div>
        <div class="logo-line">
          <div class="logo-line-inner"></div>
        </div>
      </div>
    </div>

  </div>

  <!-- Scroll Chevron -->
  <div class="chevron">
    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
      stroke-linecap="round" stroke-linejoin="round">
      <polyline points="6 9 12 15 18 9"></polyline>
    </svg>
  </div>

  <style>
    @keyframes node-float1 {

      0%,
      100% {
        transform: translate(0, 0) scale(1);
        opacity: 0.8;
      }

      33% {
        transform: translate(12px, -15px) scale(1.3);
        opacity: 1;
      }

      66% {
        transform: translate(-8px, 10px) scale(0.7);
        opacity: 0.4;
      }
    }

    @keyframes node-float2 {

      0%,
      100% {
        transform: translate(0, 0) scale(0.8);
        opacity: 0.5;
      }

      40% {
        transform: translate(-15px, 12px) scale(1.2);
        opacity: 1;
      }

      70% {
        transform: translate(10px, -8px) scale(1);
        opacity: 0.6;
      }
    }
  </style>

  <script>
    // ── Starfield ──────────────────────────────────────────────
    const canvas = document.getElementById('stars-canvas');
    const ctx = canvas.getContext('2d');
    let stars = [];

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }

    function initStars() {
      stars = [];
      for (let i = 0; i < 200; i++) {
        stars.push({
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height,
          r: Math.random() * 1.2 + 0.2,
          alpha: Math.random() * 0.7 + 0.1,
          speed: Math.random() * 0.3 + 0.05
        });
      }
    }

    function drawStars() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      stars.forEach(s => {
        s.alpha += (Math.random() - 0.5) * 0.02;
        s.alpha = Math.max(0.05, Math.min(0.9, s.alpha));
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255,255,255,${s.alpha})`;
        ctx.fill();
      });
      requestAnimationFrame(drawStars);
    }

    resize();
    initStars();
    drawStars();
    window.addEventListener('resize', () => { resize(); initStars(); });

    // ── Belt Dot Orbiting (ellipse path) ──────────────────────
    const beltDots = [
      { el: document.getElementById('bd1'), speed: 0.0008, offset: 0 },
      { el: document.getElementById('bd2'), speed: 0.0005, offset: Math.PI },
      { el: document.getElementById('bd3'), speed: 0.0006, offset: Math.PI / 1.5 },
      { el: document.getElementById('bd4'), speed: 0.0004, offset: Math.PI * 1.3 },
    ];

    // Belt ellipse: rx=375, ry=90, tilted -20deg
    const rx = 375, ry = 90, tilt = -20 * Math.PI / 180;

    function animateDots(ts) {
      beltDots.forEach(d => {
        d.offset += d.speed * 16;
        const ex = rx * Math.cos(d.offset);
        const ey = ry * Math.sin(d.offset);
        // Apply tilt rotation
        const x = ex * Math.cos(tilt) - ey * Math.sin(tilt);
        const y = ex * Math.sin(tilt) + ey * Math.cos(tilt);
        // Center of belt in hero (375px from left, 90px from top of belt)
        d.el.style.left = (375 + x - 3) + 'px';
        d.el.style.top = (90 + y - 3) + 'px';
      });
      requestAnimationFrame(animateDots);
    }
    requestAnimationFrame(animateDots);
  </script>

</body>

</html>
